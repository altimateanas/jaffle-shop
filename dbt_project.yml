name: 'jaffle_shop_test'

config-version: 2
version: '0.1'

dbt-cloud:
    project-id: "466993"
profile: 'jaffle_shop_test'
dispatch:
  - macro_namespace: dbt
    search_order:
      - jaffle_shop_test
      - altimate_snowflake_query_tags
      - dbt

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analysis"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_modules"
    - "logs"

require-dbt-version: [">=1.0.0", "<2.0.0"]

# Enable query comments — comprehensive metadata appended to every SQL statement
query-comment:
  comment: '{{ altimate_snowflake_query_tags.get_query_comment(node) }}'
  append: true

models:
  jaffle_shop:
      materialized: table
      staging:
        materialized: view
